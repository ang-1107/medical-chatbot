<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!DOCTYPE html>
<html>
	<head>
		<title>Chatbot</title>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
	</head>


	<body>
		<div class="container-fluid h-100">
			<div class="row justify-content-center h-100">
				<div class="col-md-8 col-xl-6 chat">
					<div class="card">
						<div class="card-header msg_head">
							<div class="d-flex bd-highlight">
								<div class="img_cont">
									<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img">
									<!-- <img src="https://www.prdistribution.com/spirit/uploads/pressreleases/2019/newsreleases/d83341deb75c4c4f6b113f27b1e42cd8-chatbot-florence-already-helps-thousands-of-patients-to-remember-their-medication.png" class="rounded-circle user_img"> -->
									<span class="online_icon"></span>
								</div>
								<div class="user_info">
									<span>Medical Chatbot</span>
									<p>Ask me anything!</p>
								</div>
							</div>
						</div>
						<div id="messageFormeight" class="card-body msg_card_body">


						</div>
						<div class="card-footer">
							<form id="messageArea" class="input-group">
                                <input type="text" id="text" name="msg" placeholder="Ask your query..." autocomplete="off" class="form-control type_msg" required/>
								<div class="input-group-append">
									<button type="submit" id="send" class="input-group-text send_btn"><i class="fas fa-location-arrow"></i></button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			$(document).ready(function() {
				function buildTimestamp() {
					const date = new Date();
					const hour = String(date.getHours()).padStart(2, "0");
					const minute = String(date.getMinutes()).padStart(2, "0");
					return hour + ":" + minute;
				}

				function appendMessage(messageText, isUser, timestamp) {
					const wrapper = document.createElement("div");
					wrapper.className = isUser
						? "d-flex justify-content-end mb-4"
						: "d-flex justify-content-start mb-4";

					const avatarWrapper = document.createElement("div");
					avatarWrapper.className = isUser ? "img_cont_msg" : "img_cont_msg";

					const avatar = document.createElement("img");
					avatar.className = "rounded-circle user_img_msg";
					avatar.src = isUser
						? "https://i.ibb.co/d5b84Xw/Untitled-design.png"
						: "https://cdn-icons-png.flaticon.com/512/387/387569.png";
					avatar.alt = isUser ? "User avatar" : "Bot avatar";
					avatarWrapper.appendChild(avatar);

					const bubble = document.createElement("div");
					bubble.className = isUser ? "msg_cotainer_send" : "msg_cotainer";
					bubble.textContent = messageText;

					const time = document.createElement("span");
					time.className = isUser ? "msg_time_send" : "msg_time";
					time.textContent = timestamp;
					bubble.appendChild(time);

					if (isUser) {
						wrapper.appendChild(bubble);
						wrapper.appendChild(avatarWrapper);
					} else {
						wrapper.appendChild(avatarWrapper);
						wrapper.appendChild(bubble);
					}

					document.getElementById("messageFormeight").appendChild(wrapper);
				}

				$("#messageArea").on("submit", async function(event) {
					event.preventDefault();

					const rawText = $("#text").val().trim();
					if (!rawText) {
						return;
					}

					const strTime = buildTimestamp();
					appendMessage(rawText, true, strTime);
					$("#text").val("");

					try {
						const response = await fetch("/get", {
							method: "POST",
							headers: {
								"Content-Type": "application/json",
								Accept: "application/json",
							},
							body: JSON.stringify({ msg: rawText }),
						});

						const payload = await response.json();
						if (!response.ok) {
							appendMessage(payload.error || "An error occurred.", false, strTime);
							return;
						}

						appendMessage(payload.answer, false, strTime);
					} catch (error) {
						appendMessage("Sorry, I could not reach the server.", false, strTime);
					}
				});
			});
		</script>

    </body>
</html>
